services:
  mysql:
    image: mysql:8.0
    container_name: scms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123888}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --general-log=1
      - --general-log-file=/var/log/mysql/general.log
      - --log-error=/var/log/mysql/error.log
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/sql:/docker-entrypoint-initdb.d:ro
      - ./log/docker/mysql:/var/log/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-123888}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - student-course-net

  config-service:
    build:
      context: .
      dockerfile: config-service/Dockerfile
    container_name: scms-config-service
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: native
      LOGGING_FILE_NAME: /logs/config-service.log
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/app/config-repo:ro
      - ./log/docker/config-service:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8888/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - student-course-net

  eureka-service:
    build:
      context: .
      dockerfile: eureka-service/Dockerfile
    container_name: scms-eureka-service
    restart: unless-stopped
    depends_on:
      config-service:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      CONFIG_SERVER_URL: http://config-service:8888
      SPRING_PROFILES_ACTIVE: docker
      LOGGING_FILE_NAME: /logs/eureka-service.log
    ports:
      - "8761:8761"
    volumes:
      - ./log/docker/eureka-service:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8761/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - student-course-net

  student-service:
    build:
      context: .
      dockerfile: student-service/Dockerfile
    container_name: scms-student-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      config-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      CONFIG_SERVER_URL: http://config-service:8888
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123888}
      JWT_SECRET: ${JWT_SECRET:-local-demo-secret-change-me}
      LOGGING_FILE_NAME: /logs/student-service.log
    ports:
      - "8081:8081"
    volumes:
      - ./log/docker/student-service:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - student-course-net

  course-service:
    build:
      context: .
      dockerfile: course-service/Dockerfile
    container_name: scms-course-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      config-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      CONFIG_SERVER_URL: http://config-service:8888
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123888}
      LOGGING_FILE_NAME: /logs/course-service.log
    ports:
      - "8082:8082"
    volumes:
      - ./log/docker/course-service:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - student-course-net

  teacher-service:
    build:
      context: .
      dockerfile: teacher-service/Dockerfile
    container_name: scms-teacher-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      config-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      CONFIG_SERVER_URL: http://config-service:8888
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123888}
      LOGGING_FILE_NAME: /logs/teacher-service.log
    ports:
      - "8083:8083"
    volumes:
      - ./log/docker/teacher-service:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8083/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - student-course-net

  enrollment-service:
    build:
      context: .
      dockerfile: enrollment-service/Dockerfile
    container_name: scms-enrollment-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      config-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
      student-service:
        condition: service_healthy
      course-service:
        condition: service_healthy
      teacher-service:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      CONFIG_SERVER_URL: http://config-service:8888
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123888}
      LOGGING_FILE_NAME: /logs/enrollment-service.log
    ports:
      - "8084:8084"
    volumes:
      - ./log/docker/enrollment-service:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8084/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - student-course-net

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: scms-gateway-service
    restart: unless-stopped
    depends_on:
      config-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
      student-service:
        condition: service_healthy
      course-service:
        condition: service_healthy
      teacher-service:
        condition: service_healthy
      enrollment-service:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      CONFIG_SERVER_URL: http://config-service:8888
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:-local-demo-secret-change-me}
      LOGGING_FILE_NAME: /logs/gateway-service.log
    ports:
      - "8080:8080"
    volumes:
      - ./log/docker/gateway-service:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - student-course-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /
    container_name: scms-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - student-course-net

  nginx:
    image: nginx:1.27-alpine
    container_name: scms-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      gateway-service:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./log/docker/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ && wget -q --spider http://127.0.0.1/api/courses"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - student-course-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: scms-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - student-course-net

  grafana:
    image: grafana/grafana:11.2.2
    container_name: scms-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - student-course-net

  elasticsearch:
    image: elasticsearch:8.15.2
    container_name: scms-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ./log/docker/elasticsearch:/usr/share/elasticsearch/logs
    ports:
      - "9200:9200"
    networks:
      - student-course-net

  logstash:
    image: logstash:8.15.2
    container_name: scms-logstash
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_started
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./log/docker:/logs:ro
      - logstash-data:/usr/share/logstash/data
    ports:
      - "5044:5044"
      - "9600:9600"
    networks:
      - student-course-net

  kibana:
    image: kibana:8.15.2
    container_name: scms-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_started
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - student-course-net

networks:
  student-course-net:
    driver: bridge

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
  logstash-data:

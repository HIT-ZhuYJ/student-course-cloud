apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: student-course
spec:
  selector:
    app: config-service
  ports:
    - name: http
      port: 8888
      targetPort: 8888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: student-course
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
        app.kubernetes.io/part-of: student-course-cloud
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/part-of: student-course-cloud
                topologyKey: kubernetes.io/hostname
      containers:
        - name: config-service
          image: 192.168.40.129:5000/student-course/config-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: SPRING_PROFILES_ACTIVE
              value: native
            - name: CONFIG_REPO_LOCATION
              value: file:/app/config-repo
          ports:
            - containerPort: 8888
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 800m
              memory: 768Mi
          volumeMounts:
            - name: config-repo
              mountPath: /app/config-repo
              readOnly: true
      volumes:
        - name: config-repo
          configMap:
            name: config-repo
---

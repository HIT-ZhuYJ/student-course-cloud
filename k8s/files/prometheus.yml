global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: config-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['config-service:8888']

  - job_name: eureka-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['eureka-service:8761']

  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway-service:8080']

  - job_name: student-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['student-service:8081']

  - job_name: course-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['course-service:8082']

  - job_name: teacher-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['teacher-service:8083']

  - job_name: enrollment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['enrollment-service:8084']

apiVersion: v1
kind: PersistentVolume
metadata:
  name: scms-mysql-pv
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: student-course-cloud
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: scms-local-storage
  local:
    path: /data/scms/mysql
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k8s-worker2
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: student-course
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: student-course-cloud
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: scms-local-storage
  resources:
    requests:
      storage: 10Gi

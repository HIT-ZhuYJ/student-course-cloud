server:
  port: 8081

spring:
  application:
    name: student-service
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/db_student?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    hikari:
      pool-name: student-service-hikari
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

jwt:
  secret: ${JWT_SECRET:local-demo-secret-change-me}
  expiration-millis: ${JWT_EXPIRATION_MILLIS:86400000}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.yun.studentcourse.student: info
